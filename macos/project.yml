# XcodeGen spec for the Aria macOS app + WidgetKit extension.
# Generate the project with:  brew install xcodegen && cd macos && xcodegen generate
# Then: open Aria.xcodeproj  (set your signing Team on both targets, then Run).
name: Aria
options:
  bundleIdPrefix: com.aria
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    # Pinned so the API doesn't drift and break the build (2.5.1's loose lower
    # bound had let it jump to a newer, source-incompatible release).
    exactVersion: "2.51.0"

targets:
  Aria:
    type: application
    platform: macOS
    sources:
      - Aria
      - AriaShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aria.planner
        PRODUCT_NAME: Aria
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_PREVIEWS: "YES"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "57J2R82M2H"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Aria/Aria.entitlements
      properties:
        # Un-sandboxed so the app can write the widget snapshot into the widget
        # extension's container (App Groups don't provision on a free Apple ID).
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    dependencies:
      - package: Supabase
        product: Supabase
      - target: AriaWidgetExtension

  AriaWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - AriaWidget
      - AriaShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aria.planner.AriaWidget
        PRODUCT_NAME: AriaWidget
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "57J2R82M2H"
        CODE_SIGN_STYLE: Automatic
      INFOPLIST_KEY_CFBundleDisplayName: Aria
    info:
      path: AriaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AriaWidget/AriaWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
